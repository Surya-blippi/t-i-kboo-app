name: tikboo
description: "Your group chat, decoded. WhatsApp Wrapped + AI vibe check."
publish_to: 'none'
version: 1.0.0+5

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  file_picker: ^8.1.2
  archive: ^3.6.1
  http: ^1.2.2
  shared_preferences: ^2.3.2
  flutter_animate: ^4.5.0
  intl: ^0.19.0
  share_plus: ^10.0.2
  receive_sharing_intent: ^1.8.1
  purchases_flutter: ^10.2.3
  url_launcher: ^6.3.1
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/
    - assets/brand/

  fonts:
    - family: Unbounded
      fonts:
        - asset: assets/fonts/Unbounded.ttf
    - family: PlusJakartaSans
      fonts:
        - asset: assets/fonts/PlusJakartaSans.ttf

flutter_launcher_icons:
  image_path: "assets/brand/logo.png"
  remove_alpha_ios: true
  ios: true
  android: true
  min_sdk_android: 21
  adaptive_icon_background: "#0B0B0F"
  adaptive_icon_foreground: "assets/brand/logo.png"
